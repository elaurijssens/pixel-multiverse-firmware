name: Build firmware

on:
  push:
  pull_request:
  release:
    types: [created]

env:
  BUILD_TYPE: Release

# The release job uploads UF2 assets to the GitHub release, which needs write
# access to repo contents (the default GITHUB_TOKEN is read-only).
permissions:
  contents: write

jobs:
  build:
    # One image per board × chip. The chip family is chosen by PICO_BOARD
    # (pico → rp2040, pico2 → rp2350), which is exactly how the bench build
    # (tools/multiverse-ctl.sh flash) selects it, so CI reproduces it.
    name: ${{ matrix.board }}-${{ matrix.chip }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { board: i75,     chip: rp2040,  pico_board: pico }
          # The RP2350 i75 is always the wireless i75W → build the W image (E7).
          - { board: i75,     chip: rp2350w, pico_board: pico2_w }
          - { board: plasma,  chip: rp2040,  pico_board: pico }
          - { board: plasma,  chip: rp2350,  pico_board: pico2 }
          # (a wifi Plasma 2350W / pico2_w variant can join when a board is on hand)

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: project
        fetch-depth: 0   # full history + tags so `git describe` stamps the version

    - name: Checkout Pimoroni Pico libraries
      uses: actions/checkout@v4
      with:
        repository: pimoroni/pimoroni-pico
        ref: main
        path: pimoroni-pico

    - name: Checkout Pico SDK
      uses: actions/checkout@v4
      with:
        repository: raspberrypi/pico-sdk
        ref: 2.1.1
        path: pico-sdk
        submodules: true

    - name: Install Arm GNU toolchain (arm-none-eabi-gcc)
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '13.3.Rel1'

    - name: Configure
      shell: bash
      run: >
        cmake -S "$GITHUB_WORKSPACE/project" -B "$GITHUB_WORKSPACE/build"
        -DMULTIVERSE_BOARD=${{ matrix.board }}
        -DPICO_BOARD=${{ matrix.pico_board }}
        -DCMAKE_BUILD_TYPE=$BUILD_TYPE
        -DPIMORONI_PICO_PATH="$GITHUB_WORKSPACE/pimoroni-pico"
        -DPICO_SDK_PATH="$GITHUB_WORKSPACE/pico-sdk"

    - name: Build
      shell: bash
      run: cmake --build "$GITHUB_WORKSPACE/build" --config $BUILD_TYPE -j 2

    - name: Version-stamp the image (board-chip-multiverse-<version>.uf2)
      id: stamp
      shell: bash
      run: |
        version="$(git -C "$GITHUB_WORKSPACE/project" describe --tags --always --dirty)"
        name="${{ matrix.board }}-${{ matrix.chip }}-multiverse-${version}"
        cp "$GITHUB_WORKSPACE/build/${{ matrix.board }}-multiverse.uf2" \
           "$GITHUB_WORKSPACE/${name}.uf2"
        echo "name=${name}" >> "$GITHUB_OUTPUT"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.stamp.outputs.name }}
        path: ${{ github.workspace }}/${{ steps.stamp.outputs.name }}.uf2

    - name: Attach image to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.workspace }}/${{ steps.stamp.outputs.name }}.uf2
